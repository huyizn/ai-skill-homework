<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人數位名片 - 輕霧藍紫</title>
    <style>
        :root {
            --bg-color: #f1f3f7;      /* 帶點極淡灰藍的純淨底色 */
            --card-bg: #ffffff;       /* 純白卡片襯托剔透感 */
            --text-main: #3a4454;     /* 沉穩的深霧藍色文字 */
            --primary-blue: #a3b8cc;  /* 柔和低飽和霧霾藍 */
            --accent-purple: #c5bfe0; /* 輕透低飽和薰衣草紫 */
            --tag-bg-blue: #f2f6fa;   /* 標籤微透藍 */
            --tag-bg-purple: #f5f3f9; /* 標籤微透紫 */
        }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            /* 輕盈無負擔的柔焦陰影 */
            box-shadow: 0 10px 30px rgba(163, 184, 204, 0.12);
            padding: 40px 35px;
            text-align: center;
            border: 1px solid rgba(163, 184, 204, 0.2);
        }
        .avatar {
            width: 85px;
            height: 85px;
            /* 霧藍到淺紫的優雅低飽和漸層 */
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-purple));
            border-radius: 50%;
            margin: 0 auto 24px;
        }
        h1 { margin: 0 0 8px; font-size: 25px; font-weight: 600; letter-spacing: 0.5px; }
        p.subtitle { color: #788496; margin: 0 0 35px; font-size: 14px; }
        .section { text-align: left; margin-bottom: 25px; }
        .section h3 { 
            color: var(--text-main);
            font-size: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }
        /* 區塊左側的精緻設計小色條 */
        .section-blue h3::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 15px;
            background: var(--primary-blue);
            border-radius: 2px;
            margin-right: 8px;
        }
        .section-purple h3::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 15px;
            background: var(--accent-purple);
            border-radius: 2px;
            margin-right: 8px;
        }
        .tag {
            display: inline-block;
            padding: 7px 14px;
            border-radius: 12px;       /* 內斂的微圓角 */
            font-size: 13px;
            margin: 4px 3px;
            transition: all 0.2s ease;
        }
        .tag-blue {
            background: var(--tag-bg-blue);
            color: #4a5c70;
            border: 1px solid rgba(163, 184, 204, 0.25);
        }
        .tag-purple {
            background: var(--tag-bg-purple);
            color: #5c5478;
            border: 1px solid rgba(197, 191, 224, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar"></div>
        <h1>我的 AI 網頁作業</h1>
        <p class="subtitle">多媒體與網頁前端設計成果展示</p>
        
        <!-- 專業技能區：搭配低飽和藍色調 -->
        <div class="section section-blue">
            <h3>專業技能 (Skills)</h3>
            <span class="tag tag-blue">3D 骨架繫結與權重繪製</span>
            <span class="tag tag-blue">動態視覺節奏曲線調校</span>
            <span class="tag tag-blue">AI 提示詞工程應用</span>
        </div>
        
        <!-- 審美興趣區：搭配輕透紫色調 -->
        <div class="section section-purple">
            <h3>研究與審美興趣</h3>
            <span class="tag tag-purple">現代電影敘事與符號學</span>
            <span class="tag tag-purple">莫蘭迪低飽和度空間美學</span>
            <span class="tag tag-purple">江戶時代藝術與浮世繪</span>
        </div>
    </div>
</body>
</html>
